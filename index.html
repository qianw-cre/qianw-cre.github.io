<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Personal homepage of Qian Wang">
  <meta name="theme-color" content="#f5f3ee">
  <title>Qian Wang</title>
  <style>
    :root {
      color-scheme: light;
      --paper: #f5f3ee;
      --ink: #1d1d1b;
      --muted: #6d6b65;
      --line: #d9d6ce;
      --accent: #285f4a;
      --white: #fff;
    }

    * { box-sizing: border-box; }

    html { min-height: 100%; }

    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100svh;
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        linear-gradient(rgba(29, 29, 27, .026) 1px, transparent 1px),
        var(--paper);
      background-size: 100% 56px;
    }

    .site {
      width: min(920px, calc(100% - 48px));
      min-height: 100vh;
      min-height: 100svh;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
    }

    header {
      height: 88px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--line);
    }

    .mark {
      display: inline-grid;
      place-items: center;
      width: 38px;
      height: 38px;
      border: 1px solid var(--ink);
      border-radius: 50%;
      color: var(--ink);
      font-size: .78rem;
      font-weight: 750;
      letter-spacing: -.03em;
      text-decoration: none;
    }

    nav {
      display: flex;
      align-items: center;
      gap: 26px;
    }

    nav a {
      color: var(--muted);
      font-size: .86rem;
      text-decoration: none;
      transition: color .18s ease;
    }

    nav a:hover { color: var(--ink); }

    main {
      flex: 1;
      display: grid;
      align-content: center;
      padding: 88px 0 104px;
    }

    .eyebrow {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 0 0 24px;
      color: var(--accent);
      font-size: .76rem;
      font-weight: 700;
      letter-spacing: .14em;
      text-transform: uppercase;
    }

    .eyebrow::before {
      content: "";
      width: 28px;
      height: 1px;
      background: currentColor;
    }

    h1 {
      max-width: 720px;
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(2.5rem, 5vw, 3.25rem);
      font-weight: 500;
      line-height: 1.1;
      letter-spacing: -.035em;
    }

    .intro {
      max-width: 590px;
      margin: 26px 0 0;
      color: var(--muted);
      font-size: clamp(1rem, 1.8vw, 1.12rem);
      line-height: 1.75;
    }

    .contact {
      display: grid;
      grid-template-columns: 160px 1fr;
      gap: 28px;
      align-items: start;
      max-width: 720px;
      margin-top: 64px;
      padding-top: 24px;
      border-top: 1px solid var(--line);
    }

    .contact-label {
      margin: 3px 0 0;
      color: var(--muted);
      font-size: .76rem;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
    }

    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 28px;
    }

    .links a {
      position: relative;
      color: var(--ink);
      font-size: .96rem;
      font-weight: 600;
      text-decoration: none;
    }

    .links a::after {
      content: "↗";
      margin-left: 7px;
      color: var(--accent);
      font-size: .82em;
    }

    .links a.email::after { content: "→"; }

    .links a:hover { color: var(--accent); }

    a:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 5px;
      border-radius: 2px;
    }

    footer {
      min-height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: .76rem;
    }

    @media (max-width: 620px) {
      .site { width: min(100% - 36px, 920px); }
      header { height: 76px; }
      nav { gap: 18px; }
      main { padding: 72px 0 84px; }
      h1 { font-size: clamp(2.35rem, 12vw, 2.8rem); }
      .contact {
        grid-template-columns: 1fr;
        gap: 16px;
        margin-top: 50px;
      }
      .links { flex-direction: column; align-items: flex-start; }
      footer { align-items: flex-start; flex-direction: column; justify-content: center; padding: 18px 0; }
    }
  </style>
</head>
<body>
  <div class="site">
    <header>
      <a class="mark" href="/" aria-label="Qian Wang home">QW</a>
      <nav aria-label="Primary navigation">
        <a href="mailto:qian.wang@crelife.org.cn">Email</a>
        <a href="https://github.com/qianw-cre" rel="me">GitHub</a>
      </nav>
    </header>

    <main>
      <p class="eyebrow">Personal homepage</p>
      <h1>Qian Wang</h1>
      <p class="intro">Welcome to my personal website. I’m based in Beijing and can be reached directly using the contact details below.</p>

      <section class="contact" aria-labelledby="contact-heading">
        <h2 class="contact-label" id="contact-heading">Contact</h2>
        <div class="links">
          <a class="email" href="mailto:qian.wang@crelife.org.cn">qian.wang@crelife.org.cn</a>
          <a href="https://github.com/qianw-cre" rel="me">github.com/qianw-cre</a>
        </div>
      </section>
    </main>

    <footer>
      <span>© 2026 Qian Wang</span>
      <span>Beijing, China</span>
    </footer>
  </div>
</body>
</html>
