<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Personal homepage of Qian Wang">
  <title>Qian Wang</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #152238;
      --muted: #667085;
      --accent: #3157d5;
      --surface: rgba(255,255,255,.86);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 18% 18%, rgba(49,87,213,.14), transparent 32rem),
        radial-gradient(circle at 85% 75%, rgba(34,197,166,.13), transparent 30rem),
        #f5f7fb;
    }
    main {
      width: min(680px, 100%);
      padding: clamp(40px, 8vw, 76px);
      text-align: center;
      border: 1px solid rgba(21,34,56,.08);
      border-radius: 28px;
      background: var(--surface);
      box-shadow: 0 24px 80px rgba(32,49,88,.12);
      backdrop-filter: blur(14px);
    }
    .eyebrow {
      margin: 0 0 14px;
      color: var(--accent);
      font-size: .78rem;
      font-weight: 700;
      letter-spacing: .18em;
      text-transform: uppercase;
    }
    h1 {
      margin: 0;
      font-size: clamp(3rem, 10vw, 5.6rem);
      line-height: .98;
      letter-spacing: -.055em;
    }
    .rule {
      width: 44px;
      height: 3px;
      margin: 30px auto;
      border: 0;
      border-radius: 99px;
      background: linear-gradient(90deg, var(--accent), #22c5a6);
    }
    a {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--ink);
      font-size: clamp(1rem, 3vw, 1.16rem);
      text-decoration: none;
      transition: color .2s ease, transform .2s ease;
    }
    a:hover { color: var(--accent); transform: translateY(-2px); }
    a:focus-visible { outline: 3px solid rgba(49,87,213,.3); outline-offset: 6px; border-radius: 6px; }
    svg { width: 20px; height: 20px; }
    footer {
      margin-top: 42px;
      color: var(--muted);
      font-size: .82rem;
    }
  </style>
</head>
<body>
  <main>
    <p class="eyebrow">Personal Homepage</p>
    <h1>Qian Wang</h1>
    <hr class="rule">
    <a href="mailto:qian.wang@crelife.org.cn" aria-label="Email Qian Wang">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
        <rect x="3" y="5" width="18" height="14" rx="2"></rect>
        <path d="m4 7 8 6 8-6"></path>
      </svg>
      qian.wang@crelife.org.cn
    </a>
    <footer>© 2026 Qian Wang</footer>
  </main>
</body>
</html>
